<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Crypto 5-Min Terminal</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0a0a0f; --card:#111118; --up:#00ff88; --down:#ff3355; --neutral:#7c6ef4; --text:#e8e8f0; --text-dim:#666680; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .live-pulse { animation: livePulse 1.5s ease-in-out infinite; }
    @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .flash-green { animation: flashGreen 0.5s ease; }
    .flash-red { animation: flashRed 0.5s ease; }
    @keyframes flashGreen { 0%{box-shadow:0 0 12px rgba(0,255,136,0.5)} 100%{box-shadow:none} }
    @keyframes flashRed { 0%{box-shadow:0 0 12px rgba(255,51,85,0.5)} 100%{box-shadow:none} }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(124,110,244,0.3); border-radius: 3px; }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden">
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#e8e8f0;font-family:sans-serif">
      Loading...
    </div>
  </div>

  <script>
    const { useState, useEffect, useRef, useCallback, Component } = React;
    const { createElement: h } = React;

    class ErrorBoundary extends Component {
      state = { err: null };
      static getDerivedStateFromError(err) { return { err: err }; }
      componentDidCatch(err, info) { console.error(err, info); }
      render() {
        if (this.state.err) {
          return h('div', { style: { padding: '2rem', color: '#ff3355', fontFamily: 'sans-serif', maxWidth: 500, margin: '2rem auto' } },
            h('h2', null, 'Something went wrong'),
            h('pre', { style: { fontSize: 12, overflow: 'auto' } }, this.state.err.message || String(this.state.err)));
        }
        return this.props.children;
      }
    }

    const WINDOW_SEC = 300;

    // ---- Single backend WebSocket hook ----
    function useBackendFeed(handlers, paused) {
      const [status, setStatus] = useState('disconnected');
      const wsRef = useRef(null);
      const backoffRef = useRef(1000);
      const handlersRef = useRef(handlers);
      const pausedRef = useRef(paused);
      useEffect(function() { handlersRef.current = handlers; });
      useEffect(function() { pausedRef.current = paused; }, [paused]);

      useEffect(function() {
        var mounted = true;
        function connect() {
          if (!mounted || pausedRef.current) return;
          var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          var url = proto + '//' + location.host + '/ws/feed';
          setStatus('connecting');
          var ws = new WebSocket(url);
          wsRef.current = ws;
          ws.onopen = function() {
            if (!mounted || pausedRef.current) { ws.close(); return; }
            backoffRef.current = 1000;
            setStatus('connected');
          };
          ws.onmessage = function(e) {
            try {
              var msg = JSON.parse(e.data);
              var h = handlersRef.current;
              if (!h) return;
              if (msg.type === 'snapshot' && h.onSnapshot) h.onSnapshot(msg);
              else if (msg.type === 'price' && h.onPrice) h.onPrice(msg);
              else if (msg.type === 'clob' && h.onClob) h.onClob(msg.data);
              else if (msg.type === 'markets_update' && h.onMarketsUpdate) h.onMarketsUpdate(msg.markets);
            } catch (_) {}
          };
          ws.onclose = function() {
            if (!mounted) return;
            wsRef.current = null;
            if (pausedRef.current) {
              setStatus('paused');
              return;
            }
            setStatus('disconnected');
            setTimeout(connect, Math.min(backoffRef.current, 30000));
            backoffRef.current *= 2;
          };
          ws.onerror = function() {};
        }
        if (paused) {
          if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
          setStatus('paused');
        } else {
          connect();
        }
        return function() {
          mounted = false;
          if (wsRef.current) { wsRef.current.close(); wsRef.current = null; }
        };
      }, [paused]);
      return status;
    }

    function StatusDot(props) {
      const color = props.status === 'connected' ? 'bg-[#00ff88]' : props.status === 'connecting' ? 'bg-amber-400' : props.status === 'paused' ? 'bg-gray-500' : 'bg-[#ff3355]';
      return h('span', { className: 'w-2 h-2 rounded-full ' + color + (props.status === 'connected' ? ' live-pulse' : '') });
    }

    function Header(props) {
      const [clock, setClock] = useState(new Date().toLocaleTimeString());
      useEffect(function() {
        const iv = setInterval(function() { setClock(new Date().toLocaleTimeString()); }, 1000);
        return function() { clearInterval(iv); };
      }, []);
      return h('header', { className: 'sticky top-0 z-50 border-b border-white/10 bg-[#0a0a0f]/95 backdrop-blur-md' },
        h('div', { className: 'max-w-7xl mx-auto px-4 py-3 flex items-center justify-between' },
          h('div', { className: 'flex items-center gap-4' },
            h('h1', { className: 'text-lg font-bold tracking-tight' }, 'Polymarket ', h('span', { className: 'text-[#7c6ef4]' }, '5-Min Crypto'), ' Terminal'),
            h('a', { href: '/paper', className: 'text-xs text-[var(--text-dim)] hover:text-[#7c6ef4] transition' }, 'Strategy Lab'),
            props.feedPaused
              ? h('span', { className: 'flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-gray-500/20 text-gray-400 text-[10px] font-bold' },
                  h('span', { className: 'w-1.5 h-1.5 rounded-full bg-gray-500' }), ' PAUSED')
              : h('span', { className: 'flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-[#00ff88]/10 text-[#00ff88] text-[10px] font-bold' },
                  h('span', { className: 'w-1.5 h-1.5 rounded-full bg-[#00ff88] live-pulse' }), ' LIVE')),
          h('div', { className: 'flex items-center gap-6 font-mono text-xs' },
            h('div', { className: 'flex items-center gap-2' }, h(StatusDot, { status: props.feedStatus }), h('span', { className: 'text-[var(--text-dim)]' }, 'Feed')),
            h('button', {
              onClick: props.onPauseResume,
              className: 'px-3 py-1 rounded-lg text-xs font-medium transition ' + (props.feedPaused ? 'bg-[#00ff88]/20 text-[#00ff88] hover:bg-[#00ff88]/30' : 'bg-white/5 text-[var(--text-dim)] hover:bg-white/10'),
              title: props.feedPaused ? 'Resume feed' : 'Pause feed (save resources)'
            }, props.feedPaused ? 'Resume' : 'Pause'),
            props.msgCount > 0 ? h('span', { className: 'text-[var(--text-dim)]' }, props.msgCount + ' msgs') : null,
            h('span', { className: 'text-[var(--text-dim)]' }, clock))));
    }

    function Sparkline(props) {
      var maxPoints = props.maxPoints || 30;
      var gradId = 'spark-' + (props.id || 'x');
      var arr = [...(props.history || []), props.value].filter(function(v) { return v != null; }).slice(-maxPoints);
      if (arr.length < 2) return null;
      var w = props.w || 80, height = props.h || 24;
      var fullWidth = props.fullWidth;
      var min = Math.min.apply(null, arr), max = Math.max.apply(null, arr);
      var range = Math.max(max - min, (min + max) / 2 * 0.0001);
      var pad = 2;
      var plotH = height - pad * 2;
      var points = arr.map(function(v, i) {
        var x = pad + (i / (arr.length - 1)) * (w - pad * 2);
        var y = pad + plotH - ((v - min) / range) * plotH;
        return x + ',' + y;
      }).join(' ');
      var dir = arr[arr.length - 1] >= arr[0] ? '#00ff88' : '#ff3355';
      // Open price reference line
      var openY = null;
      if (props.openPrice != null) {
        openY = pad + plotH - ((props.openPrice - min) / range) * plotH;
        openY = Math.max(pad, Math.min(height - pad, openY));
      }
      var svgProps = fullWidth
        ? { viewBox: '0 0 ' + w + ' ' + height, preserveAspectRatio: 'none', className: 'w-full rounded-lg', style: { height: height, background: 'rgba(0,0,0,0.25)' } }
        : { width: w, height: height, className: 'shrink-0 rounded', style: { background: 'rgba(0,0,0,0.2)' } };
      return h('svg', svgProps,
        h('defs', null, h('linearGradient', { id: gradId, x1: 0, y1: 0, x2: 0, y2: 1 }, h('stop', { offset: '0%', stopColor: dir, stopOpacity: 0.35 }), h('stop', { offset: '100%', stopColor: dir, stopOpacity: 0 }))),
        h('polygon', { points: pad + ',' + height + ' ' + points + ' ' + (w - pad) + ',' + height, fill: 'url(#' + gradId + ')' }),
        openY != null ? h('line', { x1: pad, y1: openY, x2: w - pad, y2: openY, stroke: 'rgba(124,110,244,0.5)', strokeWidth: 1, strokeDasharray: '4 3' }) : null,
        h('polyline', { points: points, fill: 'none', stroke: dir, strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' }));
    }

    function formatFullPrice(v, sym) {
      if (v == null) return '-';
      var useCents = sym && (sym.indexOf('btc') >= 0 || sym.indexOf('eth') >= 0);
      if (v >= 1000) return '$' + v.toLocaleString('en-US', { minimumFractionDigits: useCents ? 2 : 0, maximumFractionDigits: useCents ? 2 : 0 });
      if (v >= 1) return '$' + v.toFixed(2);
      return '$' + v.toFixed(4);
    }
    function formatTimeShort(ts) {
      if (!ts) return '';
      var d = new Date(ts * 1000);
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }
    function fmtMmSs(totalSec) {
      var m = Math.floor(totalSec / 60);
      var s = totalSec % 60;
      return m + ':' + String(s).padStart(2, '0');
    }

    var ASSET_TO_SYM = { BTC: 'btcusdt', ETH: 'ethusdt', SOL: 'solusdt' };

    function SpotPriceRow(props) {
      var [tick, setTick] = useState(0);
      useEffect(function() {
        var iv = setInterval(function() { setTick(function(t) { return t + 1; }); }, 1000);
        return function() { clearInterval(iv); };
      }, []);
      var nowSec = Math.floor(Date.now() / 1000);
      var windowStart = Math.floor(nowSec / WINDOW_SEC) * WINDOW_SEC;
      var windowEnd = windowStart + WINDOW_SEC;
      var elapsed = nowSec - windowStart;
      var progress = elapsed / WINDOW_SEC;
      var sym = ASSET_TO_SYM[props.selectedAsset] || 'btcusdt';

      var d = props.spotPrices[sym] || {};
      var wp = props.windowPrices[sym] || {};
      var symLabel = sym.replace('usdt','').toUpperCase();
      var openPrice = wp.now;
      var pctFromOpen = null;
      if (d.value != null && openPrice != null && openPrice > 0) pctFromOpen = ((d.value - openPrice) / openPrice) * 100;

      var winPrices = (d.windowHistory || []).slice().sort(function(a,b){ return a.t - b.t; }).map(function(x){ return x.price; });
      var chartArr = [].concat(winPrices, d.value != null ? [d.value] : []).filter(function(v){ return v != null; });

      return h('div', { className: 'max-w-7xl mx-auto px-4 py-3' },
        h('div', { className: 'rounded-xl border border-white/10 bg-[#111118]/80 backdrop-blur-sm p-4' },
          // Row 1: asset label, live price, % change from open
          h('div', { className: 'flex items-center gap-3 mb-3' },
            h('span', { className: 'text-xs font-bold px-2 py-0.5 rounded bg-white/5 text-[var(--text-dim)]' }, symLabel),
            h('span', { className: 'font-mono font-bold text-xl' }, formatFullPrice(d.value, sym)),
            pctFromOpen != null ? h('span', { className: 'text-sm font-mono font-semibold ' + (pctFromOpen >= 0 ? 'text-[#00ff88]' : 'text-[#ff3355]') }, (pctFromOpen >= 0 ? '+' : '') + pctFromOpen.toFixed(3) + '%') : null,
            pctFromOpen != null ? h('span', { className: 'text-[10px] text-[var(--text-dim)]' }, 'from open') : null),

          // Row 2: window info
          h('div', { className: 'flex items-center gap-4 mb-3 text-xs font-mono' },
            h('span', { className: 'text-[var(--text-dim)]' }, formatTimeShort(windowStart), ' \u2013 ', formatTimeShort(windowEnd)),
            h('span', { className: 'text-[var(--text-dim)]' }, '|'),
            h('span', { className: 'text-[var(--text-dim)]' }, 'Open: ', h('span', { className: 'text-[var(--text)]' }, formatFullPrice(openPrice, sym)))),

          // Row 3: progress bar
          h('div', { className: 'mb-3' },
            h('div', { className: 'flex items-center gap-2 mb-1' },
              h('span', { className: 'text-[10px] text-[var(--text-dim)] font-mono' }, fmtMmSs(elapsed) + ' / 5:00')),
            h('div', { className: 'w-full h-1.5 rounded-full bg-white/5 overflow-hidden' },
              h('div', { className: 'h-full rounded-full transition-all', style: { width: (progress * 100) + '%', background: pctFromOpen != null ? (pctFromOpen >= 0 ? '#00ff88' : '#ff3355') : '#7c6ef4' } }))),

          // Row 4: sparkline chart (full width)
          (function() {
            if (chartArr.length < 2) return h('div', { className: 'rounded-lg flex items-center justify-center', style: { width: '100%', height: 100, background: 'rgba(0,0,0,0.25)' } }, h('span', { className: 'text-xs text-[var(--text-dim)]' }, 'Waiting for price data...'));
            return h(Sparkline, { id: 'window-' + sym, history: winPrices, value: d.value, w: 800, h: 110, maxPoints: 500, fullWidth: true, openPrice: openPrice });
          })()));
    }

    function ProbabilityGauge(props) {
      if (props.prob == null) return h('span', { className: 'text-[var(--text-dim)]' }, '-');
      const p = Math.max(0, Math.min(1, props.prob));
      const color = p > 0.6 ? '#00ff88' : p < 0.4 ? '#ff3355' : '#7c6ef4';
      return h('div', { className: 'relative w-24 h-14' },
        h('svg', { viewBox: '0 0 100 50', className: 'w-full h-full' },
          h('path', { d: 'M 10 45 A 40 40 0 0 1 90 45', fill: 'none', stroke: 'rgba(255,255,255,0.1)', strokeWidth: 6 }),
          h('path', { d: 'M 10 45 A 40 40 0 0 1 90 45', fill: 'none', stroke: color, strokeWidth: 6, strokeDasharray: (p * 125.6) + ' 125.6', strokeLinecap: 'round', style: { transition: 'stroke 0.3s ease' } })),
        h('span', { className: 'absolute bottom-0 left-1/2 -translate-x-1/2 font-mono font-bold text-sm', style: { color: color } }, Math.round(p * 100) + '%'));
    }

    function CountdownTimer(props) {
      const [secs, setSecs] = useState(null);
      useEffect(function() {
        if (!props.endDate) return;
        const end = new Date(props.endDate).getTime();
        function tick() { setSecs(Math.max(0, Math.round((end - Date.now()) / 1000))); }
        tick();
        const iv = setInterval(tick, 1000);
        return function() { clearInterval(iv); };
      }, [props.endDate]);
      if (secs == null) return null;
      if (secs <= 0) return null;
      return h('span', { className: 'font-mono text-xs font-bold' }, Math.floor(secs/60) + ':' + String(secs % 60).padStart(2, '0'));
    }

    function MarketCard(props) {
      const m = props.market, s = props.marketState[m.conditionId] || {};
      const bestBid = s.bestBid, bestAsk = s.bestAsk, bids = s.bids || [], asks = s.asks || [], trades = s.trades || [];
      var mid = (bestBid != null && bestAsk != null) ? (parseFloat(bestBid) + parseFloat(bestAsk)) / 2 : (s.lastTradePrice != null ? parseFloat(s.lastTradePrice) : null);
      if (mid == null && m.yes_pct != null) mid = m.yes_pct / 100;
      const spread = (bestBid != null && bestAsk != null) ? ((parseFloat(bestAsk) - parseFloat(bestBid)) * 100).toFixed(1) + '%' : null;
      function toLevel(x) {
        var p = x && (x.price != null ? x.price : x[0]);
        var s = x && (x.size != null ? x.size : x[1]);
        return { price: p, size: s };
      }
      var sortedBids = bids.map(toLevel).filter(function(x){ return x.price != null && !isNaN(parseFloat(x.price)); }).sort(function(a,b){ return parseFloat(b.price) - parseFloat(a.price); });
      var sortedAsks = asks.map(toLevel).filter(function(x){ return x.price != null && !isNaN(parseFloat(x.price)); }).sort(function(a,b){ return parseFloat(a.price) - parseFloat(b.price); });
      if (bestBid != null && !sortedBids.some(function(x){ return Math.abs(parseFloat(x.price) - parseFloat(bestBid)) < 0.001; })) {
        sortedBids = [{ price: bestBid, size: '-' }].concat(sortedBids);
      }
      if (bestAsk != null && !sortedAsks.some(function(x){ return Math.abs(parseFloat(x.price) - parseFloat(bestAsk)) < 0.001; })) {
        sortedAsks = [{ price: bestAsk, size: '-' }].concat(sortedAsks);
      }
      const [flash, setFlash] = useState(null);
      useEffect(function() {
        if (s.lastTradePrice != null && s.lastTradeSide) {
          setFlash(s.lastTradeSide === 'BUY' ? 'green' : 'red');
          var t = setTimeout(function() { setFlash(null); }, 500);
          return function() { clearTimeout(t); };
        }
      }, [s.lastTradePrice, s.lastTradeSide]);
      const assetColor = m.asset === 'BTC' ? 'text-orange-400' : m.asset === 'ETH' ? 'text-blue-400' : m.asset === 'SOL' ? 'text-emerald-400' : 'text-[#7c6ef4]';
      return h('div', { className: 'rounded-xl border bg-[#111118] overflow-hidden ' + (flash === 'green' ? 'flash-green' : flash === 'red' ? 'flash-red' : ''), style: { borderColor: 'rgba(255,255,255,0.06)' } },
        h('div', { className: 'px-4 py-3 border-b border-white/5 flex items-center justify-between' },
              h('div', { className: 'flex flex-wrap items-center gap-2' },
            h('span', { className: 'font-mono font-bold text-sm ' + assetColor }, m.asset + ' Up 5m'),
            h('span', { className: 'text-[10px] text-[var(--text-dim)] break-words', title: m.question }, m.question)),
          h(CountdownTimer, { endDate: m.endDate })),
        h('div', { className: 'p-4 flex items-center gap-6' },
          h(ProbabilityGauge, { prob: mid }),
          h('div', { className: 'flex-1 min-w-0' },
            h('div', { className: 'text-[10px] text-[var(--text-dim)] mb-1' }, 'Probability (Up) - matches Polymarket'),
            mid != null ? h('div', { className: 'flex items-center gap-3 mb-2 font-mono text-sm' },
              h('span', null, 'Up ', h('span', { className: 'text-[#00ff88] font-bold' }, (mid * 100).toFixed(1) + '%')),
              h('span', { className: 'text-[var(--text-dim)]' }, '|'),
              h('span', null, 'Down ', h('span', { className: 'text-[#ff3355] font-bold' }, (100 - mid * 100).toFixed(1) + '%')),
              h('span', { className: 'text-[var(--text-dim)] text-xs' }, '(sum = 100%)')) : null,
            h('div', { className: 'flex gap-4 font-mono text-sm mb-2' },
              h('span', null, 'Bid ', h('span', { className: 'text-[#00ff88]' }, bestBid != null ? (parseFloat(bestBid)*100).toFixed(1) + '%' : '-')),
              h('span', null, 'Ask ', h('span', { className: 'text-[#ff3355]' }, bestAsk != null ? (parseFloat(bestAsk)*100).toFixed(1) + '%' : '-')),
              spread != null ? h('span', { className: 'text-[var(--text-dim)]' }, 'spread ' + spread) : null),
            h('p', { className: 'text-[9px] text-[var(--text-dim)] mb-1' }, 'Bid = best buy price, Ask = best sell price (for Up token)'),
            trades.length > 0 ? h('p', { className: 'text-[10px] text-[var(--text-dim)]' }, 'Last: ' + (parseFloat(trades[0].price || 0)*100).toFixed(1) + '% @ ' + (trades[0].size || 0) + ' (' + (trades[0].side || '') + ')') : null,
            (sortedBids.length > 0 || sortedAsks.length > 0) ? h('div', { className: 'flex gap-4 mt-2 text-[9px]' },
              h('div', { className: 'flex-1' }, h('div', { className: 'text-[#00ff88] font-mono mb-0.5' }, 'BID'), sortedBids.slice(0,5).map(function(b,i){ var p = parseFloat(b.price); return h('div', { key: i, className: 'flex justify-between' }, h('span', null, (p >= 0 && p <= 1 ? p*100 : p).toFixed(1) + '%'), h('span', { className: 'text-[var(--text-dim)]' }, b.size != null ? b.size : '-')); })),
              h('div', { className: 'flex-1' }, h('div', { className: 'text-[#ff3355] font-mono mb-0.5' }, 'ASK'), sortedAsks.slice(0,5).map(function(a,i){ var p = parseFloat(a.price); return h('div', { key: i, className: 'flex justify-between' }, h('span', null, (p >= 0 && p <= 1 ? p*100 : p).toFixed(1) + '%'), h('span', { className: 'text-[var(--text-dim)]' }, a.size != null ? a.size : '-')); }))) : null)),
        h('div', { className: 'px-4 py-2 border-t border-white/5 flex items-center justify-between text-[10px] text-[var(--text-dim)]' },
          h('span', null, 'Vol $' + (m.volume >= 1e6 ? (m.volume/1e6).toFixed(1) + 'M' : m.volume >= 1e3 ? (m.volume/1e3).toFixed(1) + 'K' : (m.volume || 0).toFixed(1))),
          h('a', { href: 'https://polymarket.com/event/' + m.slug, target: '_blank', rel: 'noopener noreferrer', className: 'text-[#7c6ef4] hover:underline' }, 'View on Polymarket ->')));
    }

    function ActivityLog(props) {
      return h('div', { className: 'max-w-7xl mx-auto px-4 py-3' },
        h('div', { className: 'rounded-xl border border-white/10 bg-[#111118] overflow-hidden', style: { maxHeight: 200 } },
          h('div', { className: 'px-4 py-2 border-b border-white/5 text-[10px] uppercase tracking-wider text-[var(--text-dim)]' }, 'Activity Log'),
          h('div', { className: 'p-2 overflow-y-auto font-mono text-[10px] space-y-1', style: { maxHeight: 160 } },
            props.logs.slice(-50).reverse().map(function(l, i) {
              return h('div', { key: i, className: 'text-[var(--text-dim)] truncate' }, h('span', { className: 'text-[#7c6ef4]' }, l.ts), ' ', l.msg);
            }))));
    }

    function App() {
      const [markets, setMarkets] = useState([]);
      const [spotPrices, setSpotPrices] = useState({});
      const [windowPrices, setWindowPrices] = useState({});
      const priceAtWindowRef = useRef({});
      const lastWindowRef = useRef({});
      const [marketState, setMarketState] = useState({});
      const [activityLog, setActivityLog] = useState([]);
      const [rawWsLog, setRawWsLog] = useState([]);
      const [msgCount, setMsgCount] = useState(0);
      const marketsRef = useRef(markets);
      useEffect(function() { marketsRef.current = markets; }, [markets]);

      const addLog = useCallback(function(msg) {
        setActivityLog(function(prev) { return prev.slice(-99).concat([{ ts: new Date().toLocaleTimeString(), msg: msg }]); });
      }, []);

      const spotLogThrottle = useRef({ last: 0 });
      const addRawWs = useCallback(function(source, data) {
        var now = Date.now();
        if (source === 'Spot') {
          if (now - spotLogThrottle.current.last < 500) return;
          spotLogThrottle.current.last = now;
        }
        setRawWsLog(function(prev) {
          var entry = { ts: new Date().toLocaleTimeString(), source: source, data: data };
          return prev.slice(-199).concat([entry]);
        });
      }, []);

      const updateSpotPrice = useCallback(function(sym, val) {
        if (!sym || val == null || isNaN(val)) return;
        var nowSec = Math.floor(Date.now() / 1000);
        var w = Math.floor(nowSec / WINDOW_SEC) * WINDOW_SEC;
        var t = nowSec - w;
        setSpotPrices(function(prev) {
          const old = prev[sym];
          const history = (old ? (old.history || []).concat(old.value) : []).filter(function(v){ return v != null; }).slice(-29);
          const change = old && old.value != null ? ((val - old.value) / old.value) * 100 : null;
          var winHist = (old && old.windowHistory) || [];
          if (lastWindowRef.current[sym] !== w) winHist = [];
          winHist = winHist.concat([{ t: t, price: val }]).slice(-400);
          var next = {}; for (var k in prev) next[k] = prev[k];
          next[sym] = { value: val, history: history, change: change, windowHistory: winHist };
          return next;
        });
        if (lastWindowRef.current[sym] !== w) {
          lastWindowRef.current[sym] = w;
          if (!priceAtWindowRef.current[sym]) priceAtWindowRef.current[sym] = {};
          priceAtWindowRef.current[sym][w] = val;
          setWindowPrices(function(prev) {
            var n = {}; for (var k in prev) n[k] = prev[k];
            if (!n[sym]) n[sym] = { now: null, future: null };
            var nowW = Math.floor(Date.now() / 1000 / WINDOW_SEC) * WINDOW_SEC;
            var pw = priceAtWindowRef.current[sym] || {};
            n[sym] = { now: pw[nowW] || null, future: pw[nowW + WINDOW_SEC] || null };
            return n;
          });
        }
      }, []);

      const handleCLOB = useCallback(function(data) {
        if (Array.isArray(data)) { data.forEach(handleCLOB); return; }
        addRawWs('CLOB', data);
        setMsgCount(function(c) { return c + 1; });
        var currentMarkets = marketsRef.current;
        function processAsset(assetId, bestBid, bestAsk, price, side, size) {
          var m = currentMarkets.find(function(mk) { return mk.yesTokenId === assetId; });
          if (!m) return;
          setMarketState(function(prev) {
            var cur = prev[m.conditionId] || {};
            var trades = (side && price) ? [{ price: price, size: size, side: side }].concat(cur.trades || []).slice(0, 5) : (cur.trades || []);
            var next = {}; for (var k in prev) next[k] = prev[k];
            next[m.conditionId] = { bestBid: bestBid != null ? bestBid : cur.bestBid, bestAsk: bestAsk != null ? bestAsk : cur.bestAsk, lastTradePrice: price != null ? price : cur.lastTradePrice, lastTradeSide: side != null ? side : cur.lastTradeSide, trades: trades, bids: cur.bids, asks: cur.asks };
            return next;
          });
        }
        if (data.event_type === 'book') {
          var m = currentMarkets.find(function(mk) { return mk.yesTokenId === data.asset_id; });
          if (m) {
            function parseLevel(x) {
              var price, size;
              if (x && typeof x === 'object' && ('price' in x || 'size' in x)) { price = x.price; size = x.size; }
              else if (Array.isArray(x) && x.length >= 2) { price = x[0]; size = x[1]; }
              else return null;
              var p = parseFloat(price), s = parseFloat(size);
              if (p > 1 && s >= 0 && s <= 1) { var t = price; price = size; size = t; }
              return { price: price, size: size };
            }
            var bids = (data.bids || []).slice(0, 10).map(parseLevel).filter(Boolean);
            var asks = (data.asks || []).slice(0, 10).map(parseLevel).filter(Boolean);
            setMarketState(function(prev) { var n = {}; for (var k in prev) n[k] = prev[k]; n[m.conditionId] = Object.assign(prev[m.conditionId] || {}, { bids: bids, asks: asks }); return n; });
          }
          addLog('book ' + (data.asset_id || '').slice(0,10) + '...');
          return;
        }
        if (data.event_type === 'best_bid_ask') {
          processAsset(data.asset_id, data.best_bid, data.best_ask, null, null, null);
          return;
        }
        var pcs = data.price_changes || [];
        if (data.event_type === 'last_trade_price' && (data.price != null || data.asset_id)) {
          var aid = data.asset_id || (pcs[0] && pcs[0].asset_id);
          var pc = pcs[0] || data;
          processAsset(aid, pc && pc.best_bid, pc && pc.best_ask, data.price != null ? data.price : (pc && pc.price), data.side || (pc && pc.side), data.size || (pc && pc.size));
          addLog('trade ' + (aid || '').slice(0,8) + '... ' + (data.price != null ? data.price : (pc && pc.price)));
          return;
        }
        for (var i = 0; i < pcs.length; i++) {
          var p = pcs[i];
          processAsset(p.asset_id, p.best_bid, p.best_ask, p.price, p.side, p.size);
        }
      }, [addLog, addRawWs]);

      const [feedPaused, setFeedPaused] = useState(false);

      // -- Single backend feed --
      const feedStatus = useBackendFeed({
        onSnapshot: function(msg) {
          if (msg.prices) {
            for (var sym in msg.prices) {
              var p = msg.prices[sym];
              if (p && p.value != null) updateSpotPrice(sym, p.value);
            }
          }
          if (msg.markets) setMarkets(msg.markets);
          addLog('snapshot received');
        },
        onPrice: function(msg) {
          if (msg.symbol && msg.value != null) {
            updateSpotPrice(msg.symbol, msg.value);
            addRawWs('Spot', msg);
          }
        },
        onClob: function(data) {
          handleCLOB(data);
        },
        onMarketsUpdate: function(mkts) {
          setMarkets(mkts);
          addLog('markets updated (' + mkts.length + ')');
        }
      }, feedPaused);

      const [selectedAsset, setSelectedAsset] = useState('BTC');
      const [selectedWindow, setSelectedWindow] = useState('now');

      const now = Date.now();
      const activeMarkets = markets.filter(function(m) {
        var end = new Date(m.endDate || 0).getTime();
        return end > now;
      });
      var marketsByAsset = {};
      activeMarkets.forEach(function(m) {
        var a = m.asset || '?';
        if (!marketsByAsset[a]) marketsByAsset[a] = [];
        marketsByAsset[a].push(m);
      });
      ['BTC','ETH','SOL'].forEach(function(a) {
        if (marketsByAsset[a]) {
          marketsByAsset[a].sort(function(x,y) { return new Date(x.endDate||0).getTime() - new Date(y.endDate||0).getTime(); });
        }
      });
      var assetMarkets = marketsByAsset[selectedAsset] || [];
      var currentMarket = selectedWindow === 'now' ? assetMarkets[0] : assetMarkets[1];
      if (!currentMarket && assetMarkets.length > 0) currentMarket = assetMarkets[0];
      useEffect(function() {
        if (activeMarkets.length > 0 && !(marketsByAsset[selectedAsset] || []).length) {
          var first = ['BTC','ETH','SOL'].find(function(a) { return (marketsByAsset[a] || []).length > 0; });
          if (first) setSelectedAsset(first);
        }
      }, [activeMarkets.length]);

      if (feedStatus === 'connecting' && markets.length === 0) {
        return h('div', { className: 'min-h-screen flex flex-col items-center justify-center gap-4', style: { background: '#0a0a0f' } },
          h('div', { className: 'w-10 h-10 border-2 border-[#7c6ef4] border-t-transparent rounded-full spin' }),
          h('p', { className: 'text-[var(--text-dim)]' }, 'Connecting to feed...'));
      }
      return h('div', { className: 'min-h-screen', style: { background: '#0a0a0f', color: '#e8e8f0' } },
        h(Header, { feedStatus: feedStatus, msgCount: msgCount, feedPaused: feedPaused, onPauseResume: function() { setFeedPaused(function(p) { return !p; }); } }),
        h(SpotPriceRow, { spotPrices: spotPrices, windowPrices: windowPrices, selectedAsset: selectedAsset }),
        h('main', { className: 'max-w-7xl mx-auto px-4 py-6', style: { minHeight: 200 } },
          activeMarkets.length === 0
            ? h('div', { className: 'text-center py-16 rounded-xl border border-white/10 bg-[#111118]' },
                h('p', { className: 'text-[var(--text-dim)] mb-4' }, 'No active 5-min crypto markets right now.'),
                h('p', { className: 'text-xs text-[var(--text-dim)] mb-4' }, 'New markets appear every 5 minutes. Try again soon.'))
            : h('div', { className: 'max-w-xl mx-auto' },
                h('div', { className: 'flex flex-wrap items-center gap-2 mb-4' },
                  ['BTC','ETH','SOL'].map(function(a) {
                    var hasMarkets = (marketsByAsset[a] || []).length > 0;
                    return h('button', {
                      key: a,
                      onClick: function() { if (hasMarkets) setSelectedAsset(a); },
                      className: 'px-4 py-2 rounded-lg text-sm font-bold transition ' + (selectedAsset === a ? 'bg-[#7c6ef4] text-white' : hasMarkets ? 'bg-white/5 text-[var(--text-dim)] hover:bg-white/10' : 'bg-white/5 text-gray-600 cursor-not-allowed')
                    }, a);
                  }),
                  h('div', { className: 'w-px h-6 bg-white/10' }),
                  h('button', {
                    onClick: function() { setSelectedWindow('now'); },
                    className: 'px-3 py-1.5 rounded-lg text-xs font-medium ' + (selectedWindow === 'now' ? 'bg-[#00ff88]/20 text-[#00ff88]' : 'bg-white/5 text-[var(--text-dim)] hover:bg-white/10')
                  }, 'Now'),
                  h('button', {
                    onClick: function() { if (assetMarkets.length >= 2) setSelectedWindow('future'); },
                    disabled: assetMarkets.length < 2,
                    className: 'px-3 py-1.5 rounded-lg text-xs font-medium ' + (selectedWindow === 'future' ? 'bg-[#7c6ef4]/20 text-[#7c6ef4]' : assetMarkets.length >= 2 ? 'bg-white/5 text-[var(--text-dim)] hover:bg-white/10' : 'bg-white/5 text-gray-600 cursor-not-allowed opacity-50')
                  }, 'Future')),
                currentMarket ? h(MarketCard, { key: currentMarket.conditionId, market: currentMarket, marketState: marketState }) : h('div', { className: 'text-center py-8 text-[var(--text-dim)] text-sm' }, 'No ' + selectedWindow + ' window for ' + selectedAsset))),
        h(ActivityLog, { logs: activityLog }),
        h('div', { className: 'max-w-7xl mx-auto px-4 py-3' },
          h('div', { className: 'rounded-xl border border-white/10 bg-[#111118] overflow-hidden', style: { maxHeight: 240 } },
            h('div', { className: 'px-4 py-2 border-b border-white/5 text-[10px] uppercase tracking-wider text-[var(--text-dim)] flex items-center justify-between' },
              h('span', null, 'WebSocket Live Feed'),
              h('span', { className: 'font-mono text-[9px]' }, 'Backend Feed  •  ' + rawWsLog.length + ' msgs')),
            h('div', { className: 'p-2 overflow-y-auto font-mono text-[10px] space-y-1 scrollbar-thin', style: { maxHeight: 200 } },
              rawWsLog.slice(-80).reverse().map(function(l, i) {
                var str;
                if (l.source === 'Spot' && l.data && l.data.symbol && l.data.value != null) {
                  str = l.data.symbol + ' $' + parseFloat(l.data.value).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
                } else if (l.source === 'CLOB' && l.data && l.data.event_type) {
                  str = l.data.event_type + (l.data.asset_id ? ' ' + String(l.data.asset_id).slice(0,12) + '...' : '') + (l.data.best_bid != null ? ' bid=' + l.data.best_bid : '') + (l.data.best_ask != null ? ' ask=' + l.data.best_ask : '');
                } else {
                  str = typeof l.data === 'object' ? JSON.stringify(l.data).slice(0, 180) + (JSON.stringify(l.data).length > 180 ? '...' : '') : String(l.data);
                }
                return h('div', { key: i, className: 'text-[var(--text-dim)] break-all' },
                  h('span', { className: l.source === 'CLOB' ? 'text-amber-400' : 'text-[#00ff88]' }, '[' + l.source + ']'),
                  h('span', { className: 'text-[#7c6ef4] ml-1' }, l.ts),
                  ' ' + str);
              })))));
    }

    var rootEl = document.getElementById('root');
    try {
      if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
        rootEl.innerHTML = '<div style="padding:2rem;color:#ff3355;font-family:sans-serif;text-align:center">Failed to load React. Check your connection or try again.</div>';
      } else if (ReactDOM.createRoot) {
        ReactDOM.createRoot(rootEl).render(h(ErrorBoundary, null, h(App)));
      } else {
        ReactDOM.render(h(ErrorBoundary, null, h(App)), rootEl);
      }
    } catch (e) {
      rootEl.innerHTML = '<div style="padding:2rem;color:#ff3355;font-family:sans-serif;max-width:400px;margin:0 auto">Error: ' + (e.message || String(e)) + '</div>';
      console.error(e);
    }
  </script>
</body>
</html>
