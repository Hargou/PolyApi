<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Explorer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
      colors: {
        brand: { 50:'#eef2ff', 100:'#e0e7ff', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 900:'#312e81' },
        surface: { 800:'#1e1b2e', 850:'#171525', 900:'#110f1f', 950:'#0c0a18' },
      }
    }
  }
}
</script>
<style>
  [x-cloak] { display: none !important; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3730a3; border-radius: 3px; }
  .price-bar { transition: width 0.5s ease; }
  .live-dot { animation: livePulse 1.5s ease-in-out infinite; }
  @keyframes livePulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.6); } 50% { opacity: 0.5; box-shadow: 0 0 6px 3px rgba(52,211,153,0); } }
  .card-enter { animation: cardIn 0.3s ease both; }
  @keyframes cardIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .live-dot { animation: pulse-dot 1.5s ease infinite; }
  .glass { background: rgba(30,27,46,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
</style>
</head>
<body class="bg-surface-950 text-gray-100 font-sans min-h-screen">

<div x-data="explorer()" x-init="init()" x-cloak>

  <!-- HEADER -->
  <header class="sticky top-0 z-50 glass border-b border-white/5">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-purple-500 flex items-center justify-center font-bold text-sm">P</div>
        <h1 class="text-lg font-bold tracking-tight">Polymarket <span class="text-brand-400">Explorer</span></h1>
      </div>
      <div class="flex items-center gap-3">
        <div class="relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" x-model="search"
            @input.debounce.300ms="applyFilters()"
            @keydown.enter="handleSearchEnter()"
            placeholder="Search or paste Polymarket URL..."
            class="w-80 pl-10 pr-4 py-2 bg-white/5 border border-white/10 rounded-xl text-sm placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500/50 transition">
        </div>
        <template x-if="wsConnected">
          <span class="flex items-center gap-1.5 text-xs text-emerald-400"><span class="w-2 h-2 rounded-full bg-emerald-400 live-dot"></span>Live</span>
        </template>
      </div>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">

    <!-- CATEGORY FILTERS -->
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <button @click="fetchLiveCrypto()"
        :class="selectedCategory === 'live-crypto'
          ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-600/20 ring-1 ring-emerald-400/30'
          : 'bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 border border-emerald-500/20'"
        class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 flex items-center gap-1.5">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 live-dot"></span> Live Crypto
      </button>
      <button @click="fetchCompare()"
        :class="selectedCategory === 'compare'
          ? 'bg-amber-600 text-white shadow-lg shadow-amber-600/20 ring-1 ring-amber-400/30'
          : 'bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 border border-amber-500/20'"
        class="px-3.5 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200 flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
        Poly vs Kalshi
      </button>
      <div class="w-px h-5 bg-white/10"></div>
      <template x-for="cat in categories" :key="cat.id">
        <button @click="toggleCategory(cat.id)"
          :class="selectedCategory === cat.id
            ? 'bg-brand-600 text-white shadow-lg shadow-brand-600/20'
            : 'bg-white/5 text-gray-400 hover:bg-white/10 hover:text-gray-200'"
          class="px-3.5 py-1.5 rounded-lg text-xs font-medium transition-all duration-200">
          <span x-text="cat.icon + ' ' + cat.label"></span>
        </button>
      </template>
    </div>

    <!-- SORT + VIEW -->
    <div class="flex items-center justify-between mb-5">
      <p class="text-xs text-gray-500">
        Showing <span class="text-gray-300 font-medium" x-text="selectedCategory === 'compare' ? compareData.length : filteredEvents.length"></span> events
        <template x-if="selectedCategory && selectedCategory !== 'live-crypto'">
          <span> in <span class="text-brand-400" x-text="categories.find(c=>c.id===selectedCategory)?.label || ''"></span></span>
        </template>
        <template x-if="selectedCategory === 'live-crypto'">
          <span> <span class="text-emerald-400">Live Crypto (BTC/ETH Up or Down)</span></span>
        </template>
        <template x-if="selectedCategory === 'compare'">
          <span> <span class="text-amber-400">matched across Polymarket & Kalshi</span></span>
        </template>
      </p>
      <div class="flex items-center gap-2">
        <select x-model="sortBy" @change="applyFilters()"
          class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-xs text-gray-300 focus:outline-none focus:ring-2 focus:ring-brand-500/50 cursor-pointer">
          <option value="volume">Volume (high-low)</option>
          <option value="liquidity">Liquidity (high-low)</option>
          <option value="markets">Most markets</option>
          <option value="title">A-Z</option>
        </select>
        <button @click="viewMode = viewMode === 'grid' ? 'list' : 'grid'"
          class="p-2 rounded-lg bg-white/5 hover:bg-white/10 text-gray-400 transition"
          :title="viewMode === 'grid' ? 'Switch to list' : 'Switch to grid'">
          <svg x-show="viewMode === 'grid'" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"></path></svg>
          <svg x-show="viewMode === 'list'" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zm6-8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2h-2zm0 8a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2h-2z"></path></svg>
        </button>
      </div>
    </div>

    <!-- STATS ROW -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
      <div class="rounded-xl bg-gradient-to-br from-white/[0.04] to-white/[0.01] border border-white/5 p-4">
        <p class="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Events</p>
        <p class="text-2xl font-bold" x-text="filteredEvents.length"></p>
      </div>
      <div class="rounded-xl bg-gradient-to-br from-white/[0.04] to-white/[0.01] border border-white/5 p-4">
        <p class="text-[10px] uppercase tracking-wider text-gray-500 mb-1">Markets</p>
        <p class="text-2xl font-bold" x-text="totalMarkets"></p>
      </div>
      <div class="rounded-xl bg-gradient-to-br from-emerald-500/5 to-transparent border border-emerald-500/10 p-4">
        <p class="text-[10px] uppercase tracking-wider text-emerald-500/70 mb-1">Volume</p>
        <p class="text-2xl font-bold text-emerald-400" x-text="'$' + formatNum(totalVolume)"></p>
      </div>
      <div class="rounded-xl bg-gradient-to-br from-brand-500/5 to-transparent border border-brand-500/10 p-4">
        <p class="text-[10px] uppercase tracking-wider text-brand-400/70 mb-1">Liquidity</p>
        <p class="text-2xl font-bold text-brand-400" x-text="'$' + formatNum(totalLiquidity)"></p>
      </div>
    </div>

    <!-- LOADING -->
    <div x-show="loading" class="flex flex-col items-center justify-center py-20 gap-3">
      <div class="w-8 h-8 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-xs text-gray-500" x-text="selectedCategory === 'compare' ? 'Matching events across platforms...' : 'Loading events...'"></p>
    </div>

    <!-- ===== COMPARE VIEW ===== -->
    <div x-show="selectedCategory === 'compare' && !loading" class="space-y-4">
      <template x-if="compareData.length === 0">
        <div class="text-center py-16">
          <p class="text-gray-500 text-sm">No matching events found across platforms.</p>
        </div>
      </template>

      <template x-for="(pair, ci) in compareData" :key="ci">
        <div class="card-enter rounded-2xl bg-gradient-to-br from-white/[0.04] to-white/[0.01] border border-white/[0.06] overflow-hidden"
             :style="'animation-delay:' + (ci * 40) + 'ms'">
          <!-- Diff badge header -->
          <div class="px-5 py-3 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <span class="text-[10px] uppercase tracking-wider text-gray-500">Match</span>
              <span class="text-xs font-bold text-amber-400" x-text="pair.score + '%'"></span>
            </div>
            <template x-if="pair.diff !== null">
              <div class="flex items-center gap-1.5">
                <span class="text-[10px] uppercase tracking-wider text-gray-500">Price Gap</span>
                <span class="px-2 py-0.5 rounded-full text-xs font-bold"
                  :class="pair.diff >= 10 ? 'bg-rose-500/20 text-rose-400' : pair.diff >= 5 ? 'bg-amber-500/20 text-amber-400' : 'bg-emerald-500/20 text-emerald-400'"
                  x-text="pair.diff.toFixed(1) + ' pts'"></span>
              </div>
            </template>
          </div>

          <!-- Side by side -->
          <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-white/5">
            <!-- Polymarket side -->
            <div class="p-5">
              <div class="flex items-center gap-2 mb-3">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-brand-600/20 text-brand-400">POLYMARKET</span>
                <template x-if="pair.poly.yes_pct !== null">
                  <span class="text-lg font-bold text-brand-400" x-text="pair.poly.yes_pct + '%'"></span>
                </template>
              </div>
              <p class="text-sm font-medium mb-2 leading-snug" x-text="pair.poly.title"></p>
              <template x-if="pair.poly.first_question">
                <p class="text-[11px] text-gray-500 mb-3 line-clamp-2" x-text="pair.poly.first_question"></p>
              </template>
              <div class="flex gap-3 text-[11px] text-gray-500">
                <span>Vol <span class="text-emerald-400 font-semibold" x-text="'$' + formatNum(parseFloat(pair.poly.volume || 0))"></span></span>
                <span>Liq <span class="text-brand-400 font-semibold" x-text="'$' + formatNum(parseFloat(pair.poly.liquidity || 0))"></span></span>
                <span x-text="pair.poly.markets_count + ' mkts'"></span>
              </div>
              <template x-if="pair.poly.yes_pct !== null">
                <div class="mt-3">
                  <div class="h-2 rounded-full bg-white/5 overflow-hidden">
                    <div class="price-bar h-full rounded-full bg-gradient-to-r from-brand-600 to-brand-400"
                      :style="'width:' + Math.max(pair.poly.yes_pct, 1) + '%'"></div>
                  </div>
                  <div class="flex justify-between text-[10px] mt-1">
                    <span class="text-brand-400" x-text="'Yes ' + pair.poly.yes_pct + '%'"></span>
                    <span class="text-gray-500" x-text="'No ' + (100 - pair.poly.yes_pct).toFixed(1) + '%'"></span>
                  </div>
                </div>
              </template>
            </div>

            <!-- Kalshi side -->
            <div class="p-5">
              <div class="flex items-center gap-2 mb-3">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-600/20 text-amber-400">KALSHI</span>
                <template x-if="pair.kalshi.yes_pct !== null">
                  <span class="text-lg font-bold text-amber-400" x-text="pair.kalshi.yes_pct + '%'"></span>
                </template>
              </div>
              <p class="text-sm font-medium mb-2 leading-snug" x-text="pair.kalshi.title"></p>
              <template x-if="pair.kalshi.first_title">
                <p class="text-[11px] text-gray-500 mb-3 line-clamp-2" x-text="pair.kalshi.first_title"></p>
              </template>
              <div class="flex gap-3 text-[11px] text-gray-500">
                <span>Vol <span class="text-amber-400 font-semibold" x-text="formatNum(pair.kalshi.volume || 0)"></span></span>
                <span class="text-gray-600" x-text="pair.kalshi.category"></span>
                <span x-text="pair.kalshi.markets_count + ' mkts'"></span>
              </div>
              <template x-if="pair.kalshi.yes_pct !== null">
                <div class="mt-3">
                  <div class="h-2 rounded-full bg-white/5 overflow-hidden">
                    <div class="price-bar h-full rounded-full bg-gradient-to-r from-amber-600 to-amber-400"
                      :style="'width:' + Math.max(pair.kalshi.yes_pct, 1) + '%'"></div>
                  </div>
                  <div class="flex justify-between text-[10px] mt-1">
                    <span class="text-amber-400" x-text="'Yes ' + pair.kalshi.yes_pct + '%'"></span>
                    <span class="text-gray-500" x-text="'No ' + (100 - pair.kalshi.yes_pct).toFixed(1) + '%'"></span>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Links footer -->
          <div class="px-5 py-2.5 border-t border-white/5 flex items-center justify-between text-[10px]">
            <a :href="'https://polymarket.com/event/' + pair.poly.slug" target="_blank" class="text-brand-400 hover:text-brand-300 transition">View on Polymarket &rarr;</a>
            <a :href="'https://kalshi.com/events/' + pair.kalshi.event_ticker" target="_blank" class="text-amber-400 hover:text-amber-300 transition">View on Kalshi &rarr;</a>
          </div>
        </div>
      </template>
    </div>

    <!-- EVENTS GRID -->
    <div x-show="!loading && selectedCategory !== 'compare'" :class="viewMode === 'grid'
      ? 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4'
      : 'flex flex-col gap-3'">
      <template x-for="(ev, idx) in filteredEvents" :key="ev.id">
        <div class="card-enter rounded-2xl bg-gradient-to-br from-white/[0.04] to-white/[0.01] border border-white/[0.06] hover:border-brand-500/30 hover:shadow-lg hover:shadow-brand-500/5 transition-all duration-300 overflow-hidden cursor-pointer group"
             :style="'animation-delay:' + (idx * 25) + 'ms'"
             @click="openEvent(ev)">

          <div class="p-5">
            <!-- Title row -->
            <div class="flex items-start justify-between gap-3 mb-3">
              <h3 class="font-semibold text-sm leading-snug line-clamp-2 group-hover:text-brand-400 transition" x-text="ev.title"></h3>
              <span class="shrink-0 px-2 py-0.5 rounded-full text-[10px] font-semibold"
                :class="(ev.markets||[]).length > 10
                  ? 'bg-purple-500/20 text-purple-400'
                  : (ev.markets||[]).length > 1
                    ? 'bg-brand-600/20 text-brand-400'
                    : 'bg-white/5 text-gray-500'"
                x-text="(ev.markets || []).length + (ev.markets?.length === 1 ? ' mkt' : ' mkts')"></span>
            </div>

            <!-- Volume / Liquidity -->
            <div class="flex items-center gap-4 text-xs mb-4">
              <span class="text-gray-500">Vol <span class="text-emerald-400 font-semibold" x-text="'$' + formatNum(parseFloat(ev.volume || 0))"></span></span>
              <span class="text-gray-500">Liq <span class="text-brand-400 font-semibold" x-text="'$' + formatNum(parseFloat(ev.liquidity || 0))"></span></span>
            </div>

            <!-- Markets preview -->
            <div class="space-y-2">
              <template x-for="mk in (ev.markets || []).slice(0, viewMode === 'list' ? 2 : 3)" :key="mk.conditionId || mk.id">
                <div class="rounded-lg bg-white/[0.03] p-2.5">
                  <p class="text-[11px] text-gray-300 mb-2 leading-snug line-clamp-2" x-text="mk.question"></p>
                  <template x-if="parsePrices(mk).length">
                    <div class="flex gap-2">
                      <template x-for="(oc, oi) in parsePrices(mk)" :key="oi">
                        <div class="flex-1 min-w-0">
                          <div class="flex justify-between text-[10px] mb-0.5">
                            <span class="text-gray-500 truncate" x-text="oc.label"></span>
                            <span class="font-bold tabular-nums"
                              :class="oc.pct > 70 ? 'text-emerald-400' : oc.pct > 30 ? 'text-amber-400' : 'text-gray-400'"
                              x-text="oc.pct.toFixed(1) + '%'"></span>
                          </div>
                          <div class="h-1.5 rounded-full bg-white/5 overflow-hidden">
                            <div class="price-bar h-full rounded-full"
                              :class="oi === 0
                                ? 'bg-gradient-to-r from-emerald-600 to-emerald-400'
                                : 'bg-gradient-to-r from-rose-600 to-rose-400'"
                              :style="'width:' + Math.max(oc.pct, 1) + '%'"></div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
              <template x-if="(ev.markets || []).length > (viewMode === 'list' ? 2 : 3)">
                <p class="text-[10px] text-gray-600 text-center pt-1">+<span x-text="ev.markets.length - (viewMode === 'list' ? 2 : 3)"></span> more</p>
              </template>
            </div>
          </div>

          <!-- Card footer -->
          <div class="px-5 py-2 border-t border-white/[0.04] flex items-center justify-between text-[10px] text-gray-600">
            <span class="truncate max-w-[60%]" x-text="ev.slug"></span>
            <span x-text="ev.endDate ? formatDate(ev.endDate) : ''"></span>
          </div>
        </div>
      </template>
    </div>

    <!-- EMPTY STATE -->
    <div x-show="!loading && selectedCategory !== 'compare' && filteredEvents.length === 0" class="text-center py-20">
      <div class="text-4xl mb-3 opacity-30">:/</div>
      <p class="text-gray-500 text-sm">No events match your filters.</p>
      <button @click="search=''; selectedCategory=null; applyFilters()" class="mt-3 text-brand-400 text-xs hover:underline">Clear filters</button>
    </div>

    <!-- LOAD MORE -->
    <div x-show="!loading && selectedCategory !== 'compare' && filteredEvents.length > 0 && hasMore" class="flex justify-center mt-8 mb-4">
      <button @click="loadMore()"
        class="px-8 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-white text-sm font-medium transition shadow-lg shadow-brand-600/20 hover:shadow-brand-500/30">
        Load More Events
      </button>
    </div>
  </div>

  <!-- ======= EVENT DETAIL MODAL ======= -->
  <div x-show="selectedEvent" x-transition.opacity
       class="fixed inset-0 z-50 flex items-start justify-center p-4 pt-12 bg-black/70 backdrop-blur-sm overflow-y-auto"
       @click.self="closeModal()">
    <div x-show="selectedEvent" x-transition.scale.95
         class="w-full max-w-3xl rounded-2xl bg-surface-850 border border-white/10 shadow-2xl shadow-black/40 mb-8">

      <!-- Modal header -->
      <div class="p-6 border-b border-white/5">
        <div class="flex items-start justify-between gap-4">
          <div class="min-w-0">
            <h2 class="text-lg font-bold mb-1" x-text="selectedEvent?.title"></h2>
            <div class="flex flex-wrap gap-3 mt-2 text-xs">
              <span class="text-gray-500">Vol: <span class="text-emerald-400 font-bold" x-text="'$' + formatNum(parseFloat(selectedEvent?.volume || 0))"></span></span>
              <span class="text-gray-500">Liq: <span class="text-brand-400 font-bold" x-text="'$' + formatNum(parseFloat(selectedEvent?.liquidity || 0))"></span></span>
              <span class="text-gray-500">Markets: <span class="text-gray-300 font-bold" x-text="(selectedEvent?.markets || []).length"></span></span>
              <template x-if="wsConnected">
                <span class="flex items-center gap-1.5 text-emerald-400 font-medium"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 live-dot"></span>Live</span>
              </template>
            </div>
          </div>
          <button @click="closeModal()" class="shrink-0 p-2 rounded-lg hover:bg-white/10 text-gray-400 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </div>

      <!-- Description -->
      <template x-if="selectedEvent?.description">
        <div class="px-6 py-3 border-b border-white/5">
          <p class="text-xs text-gray-400 leading-relaxed" x-text="selectedEvent.description.slice(0, 300) + (selectedEvent.description.length > 300 ? '...' : '')"></p>
        </div>
      </template>

      <!-- Markets list -->
      <div class="p-6 space-y-3 max-h-[60vh] overflow-y-auto">
        <template x-for="mk in (selectedEvent?.markets || [])" :key="mk.conditionId || mk.id">
          <div class="rounded-xl bg-white/[0.03] border border-white/5 p-4 hover:border-white/10 transition">
            <p class="text-sm font-medium mb-3" x-text="mk.question"></p>
            <template x-if="parsePrices(mk).length">
              <div class="space-y-2.5">
                <template x-for="(oc, oi) in parsePrices(mk)" :key="oi">
                  <div>
                    <div class="flex justify-between items-baseline text-xs mb-1">
                      <span class="text-gray-400" x-text="oc.label"></span>
                      <span class="font-bold text-sm tabular-nums"
                        :class="oc.pct > 70 ? 'text-emerald-400' : oc.pct > 30 ? 'text-amber-400' : 'text-rose-400'"
                        x-text="oc.pct.toFixed(1) + '%'"></span>
                    </div>
                    <div class="h-2.5 rounded-full bg-white/5 overflow-hidden">
                      <div class="price-bar h-full rounded-full"
                        :class="oi === 0
                          ? 'bg-gradient-to-r from-emerald-600 to-emerald-400'
                          : 'bg-gradient-to-r from-rose-600 to-rose-400'"
                        :style="'width:' + Math.max(oc.pct, 1) + '%'"></div>
                    </div>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="liveFeed[mk.conditionId]">
              <div class="mt-3 pt-2.5 border-t border-white/5 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 live-dot shrink-0"></span>
                <p class="text-[11px] text-emerald-400/70 font-mono truncate" x-text="liveFeed[mk.conditionId]"></p>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Modal footer -->
      <div class="px-6 py-3 border-t border-white/5 flex items-center justify-between">
        <a :href="'https://polymarket.com/event/' + selectedEvent?.slug" target="_blank"
           class="text-xs text-brand-400 hover:text-brand-300 transition">
          View on Polymarket &rarr;
        </a>
        <span class="text-[10px] text-gray-600" x-text="selectedEvent?.slug"></span>
      </div>
    </div>
  </div>

</div>

<script>
function explorer() {
  return {
    events: [],
    filteredEvents: [],
    compareData: [],
    selectedCategory: null,
    search: '',
    sortBy: 'volume',
    viewMode: 'grid',
    loading: true,
    offset: 0,
    hasMore: true,

    selectedEvent: null,
    wsSocket: null,
    wsConnected: false,
    liveFeed: {},

    categories: [
      { id: 'all',      label: 'All',          icon: '',   keywords: [] },
      { id: 'politics', label: 'Politics',      icon: '',  keywords: ['election','president','trump','biden','senate','governor','vote','democrat','republican','nominee','congress','speaker','parliament','macron','starmer','putin','xi','political','deport','nato','ceasefire','war','ukraine','russia','israel','iran','syria','tariff','sanctions'] },
      { id: 'sports',   label: 'Sports',        icon: '',  keywords: ['nba','nfl','nhl','mlb','fifa','world cup','champion','playoff','mvp','rookie','soccer','football','basketball','baseball','hockey','f1','ufc','boxing','tennis','super bowl','stanley cup','premier league'] },
      { id: 'crypto',   label: 'Crypto',        icon: '',  keywords: ['bitcoin','btc','ethereum','eth','crypto','token','airdrop','blockchain','defi','nft','solana','coinbase','kraken','ipo','pump.fun','megaeth','hyperliquid','stablecoin'] },
      { id: 'culture',  label: 'Culture',        icon: '',  keywords: ['gta','taylor swift','movie','album','music','celebrity','oscar','grammy','game','release','disney','netflix','rihanna','pregnant','cost','sold','record'] },
      { id: 'science',  label: 'Sci & Tech',    icon: '',  keywords: ['ai','openai','gpt','google','apple','spacex','mars','moon','climate','fda','drug','vaccine','nuclear','quantum','neuralink','robot'] },
      { id: 'world',    label: 'World',          icon: '',  keywords: ['country','uk','china','india','europe','nato','eu','invasion','military','ceasefire','recognition','sovereignty','somaliland','greenland','annex'] },
    ],

    async init() {
      await this.fetchEvents();
      this.checkUrlHash();
    },

    checkUrlHash() {
      const hash = window.location.hash.replace('#', '');
      if (hash) this.lookupSlug(hash);
    },

    extractSlug(input) {
      input = input.trim();
      // polymarket.com/event/some-slug  ->  some-slug
      const urlMatch = input.match(/polymarket\.com\/event\/([a-zA-Z0-9_-]+)/);
      if (urlMatch) return urlMatch[1];
      // plain slug (no spaces, has dashes)
      if (/^[a-zA-Z0-9_-]+$/.test(input) && input.includes('-')) return input;
      return null;
    },

    async handleSearchEnter() {
      const slug = this.extractSlug(this.search);
      if (slug) {
        await this.lookupSlug(slug);
      } else {
        await this.serverSearch(this.search);
      }
    },

    async lookupSlug(slug) {
      this.loading = true;
      try {
        const r = await fetch('/api/event/' + slug);
        if (r.ok) {
          const ev = await r.json();
          if (ev && ev.id) {
            this.loading = false;
            this.openEvent(ev);
            return;
          }
        }
      } catch {}
      this.loading = false;
    },

    async serverSearch(q) {
      if (!q || q.length < 2) return;
      this.loading = true;
      try {
        const r = await fetch('/api/search?q=' + encodeURIComponent(q));
        if (r.ok) {
          const results = await r.json();
          if (results.length) {
            this.events = results;
            this.hasMore = false;
            this.applyFilters();
          }
        }
      } catch {}
      this.loading = false;
    },

    async fetchEvents() {
      this.loading = true;
      this.offset = 0;
      try {
        const r = await fetch('/api/events?limit=50&offset=0');
        this.events = await r.json();
        this.hasMore = this.events.length === 50;
        this.applyFilters();
      } catch(e) { console.error('fetch events', e); }
      this.loading = false;
    },

    async loadMore() {
      this.offset += 50;
      try {
        const r = await fetch(`/api/events?limit=50&offset=${this.offset}`);
        const more = await r.json();
        this.events = [...this.events, ...more];
        this.hasMore = more.length === 50;
        this.applyFilters();
      } catch(e) { console.error('load more', e); }
    },

    async fetchLiveCrypto() {
      if (this.selectedCategory === 'live-crypto') {
        this.selectedCategory = null;
        await this.fetchEvents();
        return;
      }
      this.selectedCategory = 'live-crypto';
      this.search = '';
      this.loading = true;
      try {
        const r = await fetch('/api/live-crypto');
        const events = await r.json();
        this.events = events;
        this.filteredEvents = events;
        this.hasMore = false;
      } catch(e) { console.error('live-crypto', e); }
      this.loading = false;
    },

    async fetchCompare() {
      if (this.selectedCategory === 'compare') {
        this.selectedCategory = null;
        this.compareData = [];
        await this.fetchEvents();
        return;
      }
      this.selectedCategory = 'compare';
      this.search = '';
      this.loading = true;
      this.compareData = [];
      try {
        const r = await fetch('/api/compare');
        const pairs = await r.json();
        this.compareData = pairs;
        this.filteredEvents = pairs.map(p => ({
          id: p.poly.slug,
          title: p.poly.title,
          volume: p.poly.volume,
          liquidity: p.poly.liquidity,
          markets: [],
        }));
        this.hasMore = false;
      } catch(e) { console.error('compare', e); }
      this.loading = false;
    },

    toggleCategory(id) {
      if (this.selectedCategory === 'live-crypto' || this.selectedCategory === 'compare') {
        this.compareData = [];
        this.fetchEvents().then(() => {
          this.selectedCategory = (id === 'all') ? null : id;
          this.applyFilters();
        });
        return;
      }
      this.selectedCategory = (this.selectedCategory === id || id === 'all') ? null : id;
      this.applyFilters();
    },

    applyFilters() {
      if (this.selectedCategory === 'live-crypto' || this.selectedCategory === 'compare') return;
      let list = [...this.events];

      // Category filter (keyword-based)
      if (this.selectedCategory) {
        const cat = this.categories.find(c => c.id === this.selectedCategory);
        if (cat && cat.keywords.length) {
          list = list.filter(ev => {
            const blob = ((ev.title || '') + ' ' + (ev.slug || '') + ' ' +
              (ev.markets || []).map(m => m.question || '').join(' ')).toLowerCase();
            return cat.keywords.some(kw => blob.includes(kw));
          });
        }
      }

      // Text search
      if (this.search.trim()) {
        const q = this.search.toLowerCase();
        list = list.filter(ev => {
          const blob = ((ev.title || '') + ' ' + (ev.slug || '') + ' ' +
            (ev.markets || []).map(m => m.question || '').join(' ')).toLowerCase();
          return blob.includes(q);
        });
      }

      // Sort
      list.sort((a, b) => {
        if (this.sortBy === 'volume') return parseFloat(b.volume||0) - parseFloat(a.volume||0);
        if (this.sortBy === 'liquidity') return parseFloat(b.liquidity||0) - parseFloat(a.liquidity||0);
        if (this.sortBy === 'markets') return (b.markets||[]).length - (a.markets||[]).length;
        if (this.sortBy === 'title') return (a.title||'').localeCompare(b.title||'');
        return 0;
      });
      this.filteredEvents = list;
    },

    get totalMarkets() {
      return this.filteredEvents.reduce((s, ev) => s + (ev.markets || []).length, 0);
    },
    get totalVolume() {
      return this.filteredEvents.reduce((s, ev) => s + parseFloat(ev.volume || 0), 0);
    },
    get totalLiquidity() {
      return this.filteredEvents.reduce((s, ev) => s + parseFloat(ev.liquidity || 0), 0);
    },

    parsePrices(mk) {
      try {
        const outcomes = JSON.parse(mk.outcomes || '[]');
        const prices = JSON.parse(mk.outcomePrices || '[]');
        return outcomes.map((label, i) => ({ label, pct: parseFloat(prices[i] || 0) * 100 }));
      } catch { return []; }
    },

    formatNum(n) {
      if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
      if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
      return Math.round(n).toLocaleString();
    },

    formatDate(d) {
      try { return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }); }
      catch { return ''; }
    },

    // ---------- Event detail + live WS ----------

    async openEvent(ev) {
      this.selectedEvent = ev;
      this.liveFeed = {};
      const tokenIds = [];
      const condMap = {};
      for (const mk of (ev.markets || [])) {
        if (!mk.conditionId) continue;
        try {
          const r = await fetch('/api/clob/' + mk.conditionId);
          const clob = await r.json();
          for (const tok of (clob.tokens || [])) {
            tokenIds.push(tok.token_id);
            condMap[tok.token_id] = mk.conditionId;
          }
        } catch {}
      }
      if (tokenIds.length) this.connectWs(tokenIds, condMap);
    },

    closeModal() {
      this.selectedEvent = null;
      this.disconnectWs();
    },

    connectWs(tokenIds, condMap) {
      this.disconnectWs();
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      this.wsSocket = new WebSocket(proto + '://' + location.host + '/ws/prices');
      this.wsSocket.onopen = () => {
        this.wsConnected = true;
        this.wsSocket.send(JSON.stringify({ asset_ids: tokenIds }));
      };
      this.wsSocket.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          if (data.market) {
            const cid = data.market;
            const etype = data.event_type || 'update';
            if (etype === 'best_bid_ask') {
              this.liveFeed[cid] = 'bid=' + data.best_bid + ' ask=' + data.best_ask + ' spread=' + data.spread;
            } else if (data.price_changes) {
              const pc = data.price_changes[0];
              if (pc) this.liveFeed[cid] = 'price=' + pc.price + ' size=' + pc.size + ' bid=' + pc.best_bid + ' ask=' + pc.best_ask;
            }
          } else if (Array.isArray(data)) {
            for (const item of data) {
              const aid = item.asset_id || '';
              const cid = condMap[aid];
              if (cid && item.event_type === 'book') {
                this.liveFeed[cid] = 'book: ' + (item.bids||[]).length + ' bids, ' + (item.asks||[]).length + ' asks';
              }
            }
          }
        } catch {}
      };
      this.wsSocket.onclose = () => { this.wsConnected = false; };
      this.wsSocket.onerror = () => { this.wsConnected = false; };
    },

    disconnectWs() {
      if (this.wsSocket) { this.wsSocket.close(); this.wsSocket = null; }
      this.wsConnected = false;
    },
  };
}
</script>
</body>
</html>
